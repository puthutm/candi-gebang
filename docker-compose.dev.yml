version: '3.8'

services:
  # =========================================================================
  # DATABASES (Exposed on distinct host ports for local development)
  # =========================================================================
  postgres-core:
    image: postgres:16-alpine
    container_name: unsia-postgres-core
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: core_db
    ports:
      - "5431:5432"
    volumes:
      - pgdata-core:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-reference:
    image: postgres:16-alpine
    container_name: unsia-postgres-reference
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: reference_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata-reference:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-crm:
    image: postgres:16-alpine
    container_name: unsia-postgres-crm
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: crm_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata-crm:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-pmb:
    image: postgres:16-alpine
    container_name: unsia-postgres-pmb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: pmb_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata-pmb:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-finance:
    image: postgres:16-alpine
    container_name: unsia-postgres-finance
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: finance_db
    ports:
      - "5435:5432"
    volumes:
      - pgdata-finance:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-academic:
    image: postgres:16-alpine
    container_name: unsia-postgres-academic
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: academic_db
    ports:
      - "5436:5432"
    volumes:
      - pgdata-academic:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-hris:
    image: postgres:16-alpine
    container_name: unsia-postgres-hris
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: hris_db
    ports:
      - "5437:5432"
    volumes:
      - pgdata-hris:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-lms:
    image: postgres:16-alpine
    container_name: unsia-postgres-lms
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: lms_db
    ports:
      - "5438:5432"
    volumes:
      - pgdata-lms:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-assessment:
    image: postgres:16-alpine
    container_name: unsia-postgres-assessment
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: assessment_db
    ports:
      - "5439:5432"
    volumes:
      - pgdata-assessment:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-portal:
    image: postgres:16-alpine
    container_name: unsia-postgres-portal
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: portal_db
    ports:
      - "5440:5432"
    volumes:
      - pgdata-portal:/var/lib/postgresql/data
    restart: unless-stopped

  # =========================================================================
  # CACHE & MESSAGE BROKER
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: unsia-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: unsia-rabbitmq-local
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  pgdata-core:
  pgdata-reference:
  pgdata-crm:
  pgdata-pmb:
  pgdata-finance:
  pgdata-academic:
  pgdata-hris:
  pgdata-lms:
  pgdata-assessment:
  pgdata-portal:
  redisdata:
  rabbitmqdata:
